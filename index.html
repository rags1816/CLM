    } else {
      geminiInput.style.display = 'none';
      geminiInput.value = geminiSelect.value;
    }
  });

  document.getElementById('btnSaveKeys').addEventListener('click',()=>{
    STATE.ai.mode = document.getElementById('setMode').value;
    STATE.ai.webSearch = document.getElementById('setWebSearch').checked;
    STATE.ai.fallbackMode = document.getElementById('setFallbackMode').value;
    STATE.ai.claudeKey = document.getElementById('setClaudeKey').value.trim();
    STATE.ai.claudeModel = (claudeSelect.value === 'custom' ? claudeInput.value : claudeSelect.value).trim();
    STATE.ai.geminiKey = document.getElementById('setGeminiKey').value.trim();
    STATE.ai.geminiModel = (geminiSelect.value === 'custom' ? geminiInput.value : geminiSelect.value).trim();
    saveState();
    document.getElementById('aiTestOut').innerHTML = '<span style="color:var(--green);">Saved.</span>';
  });
  document.getElementById('btnClearKeys').addEventListener('click',()=>{
    STATE.ai.claudeKey=''; STATE.ai.geminiKey=''; STATE.ai.mode='sandbox'; saveState(); render();
  });
  document.getElementById('btnTestAI').addEventListener('click', async ()=>{
    const out = document.getElementById('aiTestOut');
    out.textContent = 'Testing…';
    const mode = STATE.ai.mode;
    if (mode === 'sandbox') {
      out.innerHTML = `<span style="color:var(--amber);">Active Mode is Sandbox. To test a connection, change the "API Mode" dropdown above to Gemini or Claude, then click Save and Test again.</span>`;
      return;
    }
    
    // Temporarily disable fallback so we get the direct error of the selected mode
    const origFallback = STATE.ai.fallbackMode;
    STATE.ai.fallbackMode = 'none';
    
    try{
      let text = '';
      if (mode === 'claude') {
        text = await askClaude('Test connection. Reply only "Claude OK".');
      } else if (mode === 'gemini') {
        text = await askGemini('Test connection. Reply only "Gemini OK".');
      }
      out.innerHTML = `<span style="color:var(--green);">Connection Successful:</span> ${esc(text)}`;
    }catch(e){
      const formatted = formatNetworkError(e, mode);
      out.innerHTML = `<span style="color:var(--red); font-weight: 500;">Connection Failed:</span><br><span style="font-size:12px;color:var(--red);">${esc(formatted)}</span>`;
    } finally {
      STATE.ai.fallbackMode = origFallback;
    }
  });
  document.getElementById('btnResetAll').addEventListener('click',()=>{
    if(confirm('This clears all local CLM Suite data on this device. Continue?')){
      window.localStorage.removeItem('clm_suite_state');
      STATE = JSON.parse(JSON.stringify(DEFAULT_STATE));
      render();
    }
  });
  document.getElementById('btnLoadDemo').addEventListener('click',()=>{
    if(hasNonDemoData()){
      const ok = confirm('This will REPLACE your current Tiering, Register, Rebates, Coverage, QBR and Scorecard data with the 3-supplier demo dataset — export anything you want to keep first.\n\nReplace with demo data?');
      if(!ok) return;
    }
    loadDemoData();
    render();
  });
}

let tourIndex = -1;
let TOUR_POS = null;
let TOUR_COLLAPSED = false;
let dragState = {dragging:false, offX:0, offY:0};
function startDrag(clientX, clientY, card){
  dragState.dragging = true;
  const rect = card.getBoundingClientRect();
  dragState.offX = clientX - rect.left; dragState.offY = clientY - rect.top;
}
function moveDrag(clientX, clientY){
  if(!dragState.dragging) return;
  TOUR_POS = { left: clientX-dragState.offX, top: clientY-dragState.offY };
  const ov = document.getElementById('tourOverlay');
  if(ov){ ov.style.left=TOUR_POS.left+'px'; ov.style.top=TOUR_POS.top+'px'; ov.style.right='auto'; ov.style.bottom='auto'; ov.style.justifyContent='flex-start'; }
}
document.addEventListener('mousemove', e=> moveDrag(e.clientX, e.clientY));
document.addEventListener('mouseup', ()=>{ dragState.dragging=false; });
document.addEventListener('touchmove', e=>{
  if(!dragState.dragging) return;
  const t = e.touches[0]; if(!t) return;
  moveDrag(t.clientX, t.clientY);
  e.preventDefault();
}, {passive:false});
document.addEventListener('touchend', ()=>{ dragState.dragging=false; });
document.addEventListener('touchcancel', ()=>{ dragState.dragging=false; });
function makeDraggable(card){
  const handle = card.querySelector('#tourDragHandle') || card;
  handle.addEventListener('mousedown', e=>{ startDrag(e.clientX, e.clientY, card); e.preventDefault(); });
  handle.addEventListener('touchstart', e=>{
    const t = e.touches[0]; if(!t) return;
    startDrag(t.clientX, t.clientY, card);
  }, {passive:true});
}

function hasNonDemoData(){
  return STATE.tieringBulk.length>0 || STATE.register.length>0 || STATE.rebates.length>0 ||
    STATE.coverage.categories.length>0 || STATE.coverage.feedback.length>0 || STATE.coverage.collaboration.length>0 ||
    !!STATE.qbr.supplier || Object.keys(STATE.scorecard).length>0;
}
function startDemoTour(){
  if(hasNonDemoData()){
    const ok = confirm('The demo tour needs its own dataset (3 sample suppliers) to match what it narrates. This will REPLACE your current Tiering, Register, Rebates, Coverage, QBR and Scorecard data — export anything you want to keep first.\n\nReplace with demo data and start the tour?');
    if(!ok) return;
  }
  loadDemoData();
  TOUR_POS = null; TOUR_COLLAPSED = false;
  tourIndex = 0;
  showTourStep();
}
function showTourStep(){
  const step = TOUR[tourIndex];
  if(!step){ endTour(); return; }
  setScreen(step.screen);
  renderTourOverlay(step);
}
function renderTourOverlay(step){
  let ov = document.getElementById('tourOverlay');
  if(!ov){ ov = document.createElement('div'); ov.id='tourOverlay'; document.body.appendChild(ov); }
  if(TOUR_POS){
    ov.style.left = TOUR_POS.left+'px'; ov.style.top = TOUR_POS.top+'px';
    ov.style.right = 'auto'; ov.style.bottom = 'auto'; ov.style.justifyContent = 'flex-start';
  }else{
    ov.style.left=''; ov.style.top=''; ov.style.right=''; ov.style.bottom=''; ov.style.justifyContent='';
  }
  if(TOUR_COLLAPSED){
    ov.innerHTML = `<div id="tourCard" class="collapsed">
      <span class="small mono">TOUR ${tourIndex+1}/${TOUR.length}</span>
      <button class="btn small gold" id="tourExpand">Show</button>
    </div>`;
    document.getElementById('tourExpand').addEventListener('click',()=>{ TOUR_COLLAPSED=false; renderTourOverlay(step); });
    makeDraggable(document.getElementById('tourCard'));
    return;
  }
  ov.innerHTML = `<div id="tourCard">
    <div id="tourDragHandle" class="row" style="justify-content:space-between;align-items:center;cursor:move;">
      <span class="small mono">GUIDED TOUR · ${tourIndex+1}/${TOUR.length} <span style="opacity:.6;">(drag to move)</span></span>
      <button class="btn small" id="tourMinimize" style="background:none;border:1px solid #4a5361;color:#c9c2b4;padding:2px 9px;">Hide</button>
    </div>
    <p style="margin:8px 0 14px;font-size:14px;line-height:1.5;">${esc(step.text)}</p>
    <div class="row">
      <button class="btn small outline" id="tourPrev" ${tourIndex===0?'disabled':''} style="color:var(--paper);border-color:#4a5361;">Back</button>
      <button class="btn small gold" id="tourNext">${tourIndex===TOUR.length-1?'Finish':'Next'}</button>
      <button class="btn small" id="tourSkip" style="background:none;border:1px solid #4a5361;color:#c9c2b4;">Skip</button>
    </div>
  </div>`;
  document.getElementById('tourNext').addEventListener('click',()=>{ tourIndex++; showTourStep(); });
  document.getElementById('tourPrev').addEventListener('click',()=>{ tourIndex--; showTourStep(); });
  document.getElementById('tourSkip').addEventListener('click', endTour);
  document.getElementById('tourMinimize').addEventListener('click',()=>{ TOUR_COLLAPSED=true; renderTourOverlay(step); });
  makeDraggable(document.getElementById('tourCard'));
}
function endTour(){
  tourIndex = -1;
  TOUR_POS = null; TOUR_COLLAPSED = false;
  const ov = document.getElementById('tourOverlay');
  if(ov) ov.remove();
}
document.addEventListener('click', e=>{
  if(e.target && e.target.id==='btnStartTour') startDemoTour();
});

render();
renderFloaterTips();
document.getElementById('versionTag').textContent = 'v'+APP_VERSION;
