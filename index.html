   CLM SUITE — Contract Lifecycle Management
   Single-file, self-contained. No install, no server, no account.
   Data lives in localStorage on this device only.
   ============================================================ */

/* ---------- constants ---------- */
/* ---------- version (single source of truth — bump this, nothing else) ---------- */
const APP_VERSION = '2.4.0';

const SCREENS = [
  {id:'about', label:'About'},
  {id:'tiering', label:'0 · Tiering'},
  {id:'framework', label:'Framework'},
  {id:'register', label:'Obligations/SLA/CO'},
  {id:'rebates', label:'Rebates'},
  {id:'qbr', label:'QBR'},
  {id:'coverage', label:'Coverage & Feedback'},
  {id:'scorecard', label:'Maturity'},
  {id:'governance', label:'Governance'},
  {id:'settings', label:'⚙ Settings'}
];

const TIERS = [
  {min:3.6, name:'Strategic', code:'t1',
   workflow:['Named relationship owner accountable for the account','Full quarterly business review (QBR) with live KPI/SLA dashboard','Obligation & SLA tracking fully automated, 30/60/90-day alerts','Joint Business Planning (JBP) and innovation/collaboration roadmap','Change control via formal board sign-off (legal + category lead)','Termination/renewal notice flagged 120+ days in advance']},
  {min:2.8, name:'Managed', code:'t2',
   workflow:['Category owner responsible, no dedicated relationship lead required','Semi-annual performance review against defined KPIs','Automated obligation and SLA alerts, manual escalation','Rebate/credit reconciliation on a quarterly cycle','Standard change control, materiality-based approval','Renewal notice flagged 90 days in advance']},
  {min:1.8, name:'Transactional', code:'t3',
   workflow:['Managed by category/ops team as part of broader portfolio','Annual or exception-based review only','Automated renewal and compliance alerts, no active KPI tracking','Amendments via lightweight approval, no formal board','Renewal notice flagged 60 days in advance']},
  {min:0, name:'Routine / Leverage', code:'t4',
   workflow:['Compliance-only oversight, no active management cycle','System-generated renewal alert is the only required touchpoint','Reviewed only if flagged by spend anomaly or supplier issue','Candidate for consolidation or catalogue/PO buying instead']}
];

// Returned by getTier when a score can't be matched to any real tier (NaN from a missing/
// corrupted axis value, or a negative score from a corrupted one) -- NOT part of TIERS, so it's
// never silently counted as Routine/Leverage in the portfolio table, heatmap, or governance mix.
const TIER_ERROR = {min:null, name:'⚠ Data error', code:'terr',
  workflow:['This contract\'s tiering score could not be calculated — one or more axis scores (Value/Risk/Criticality/Impact) is missing or invalid.','Do not treat this as Routine/Leverage — the real risk level is unknown until repaired.','Re-open Tiering and reset this contract\'s sliders (or re-enter the row) to repair it.']};

function weightedScore(v){ return v.value*0.3 + v.risk*0.3 + v.criticality*0.2 + v.impact*0.2; }
function getTier(score){
  const t = TIERS.find(t=>score>=t.min);
  return t || TIER_ERROR; // never silently downgrade an unmatched (NaN/corrupted) score to the lowest tier
}

/* Naming scheme: 'standard' (Strategic/Managed/Transactional/Routine) or
   'gsb' (Gold/Silver/Bronze — the recognised public-procurement/GCF naming).
   GSB is a 3-band scheme, so Transactional + Routine both display as Bronze —
   the underlying 4-way score/tier engine is unchanged either way. */
const GSB_LABELS = {t1:'🥇 Gold', t2:'🥈 Silver', t3:'🥉 Bronze', t4:'🥉 Bronze'};
const GSB_CLASS = {t1:'gold', t2:'silver', t3:'bronze', t4:'bronze'};
function tierDisplayName(code){
  if(code==='terr') return TIER_ERROR.name;
  if(STATE.tierScheme==='gsb') return GSB_LABELS[code];
  return TIERS.find(t=>t.code===code).name;
}
function tierBadgeClass(code){
  if(code==='terr') return 'terr';
  return STATE.tierScheme==='gsb' ? GSB_CLASS[code] : code;
}
function tierBucketCounts(bulk){
  if(STATE.tierScheme==='gsb'){
    const counts={t1:0,t2:0,t3:0};
    bulk.forEach(r=>{ const code=getTier(weightedScore(r)).code; counts[code==='t4'?'t3':code]++; });
    return [
      {code:'t1', label:GSB_LABELS.t1, cls:'gold', count:counts.t1},
      {code:'t2', label:GSB_LABELS.t2, cls:'silver', count:counts.t2},
      {code:'t3', label:GSB_LABELS.t3, cls:'bronze', count:counts.t3}
    ];
  }
  const counts={t1:0,t2:0,t3:0,t4:0};
  bulk.forEach(r=>{ counts[getTier(weightedScore(r)).code]++; });
  return TIERS.map(t=>({code:t.code, label:t.name, cls:t.code, count:counts[t.code]}));
}

const GUIDE_TIPS = {
  about:['This is the front door — the pitch, the framework at a glance, and where to start.','Head to Settings first if you want AI drafting (Claude/Gemini) rather than Sandbox mode.','See the "offline vs. internet" card below for what needs a connection.'],
  tiering:['Score one contract with the sliders, or paste several into the bulk table to test auto-tiering.','Weights: Value & Risk 30% each, Criticality & Impact 20% each — tune the logic to your risk appetite in code if needed.','"AI score contract list" works even in Sandbox mode (offline heuristic) — no connection required.','Upload a .docx/.pdf under "Upload & Analyze Contract" (up to 350 pages) to set it as the active contract — it\'s reused automatically across QBR, Rebates, and Register, no separate upload needed on those tabs.','The bulk table also has optional UNSPSC/CPV code fields — manual entry only, no lookup or validation.','Uploading a confidential contract? Check the badge above the upload box: Sandbox keeps it fully local (offline heuristics); Claude/Gemini sends it out for a higher-fidelity AI read. Switch modes in ⚙ Settings first if you need to.'],
  framework:['The full 0–7 framework brief, plus benchmarking references (CIPS, Hackett, WorldCC).','Use "AI draft executive summary" to tailor it to your org profile — works offline in Sandbox mode too.','Word export needs internet once per session to load the library; falls back to a plain .doc file if blocked.','If a contract is active (uploaded on Tiering), the summary is grounded in a full-document AI review of it, not just your org profile fields — long documents offer a quick vs. full review choice with a cost estimate first.'],
  qbr:['Fill supplier, period, KPIs and SLAs — then let AI draft the narrative summary from what you\'ve entered.','Word export falls back automatically if offline; PowerPoint export has no offline fallback and needs a connection.','If a contract is active, "AI Extract KPIs/SLAs" pulls them straight from it — offers the same quick vs. full review choice as elsewhere for long documents.','The 📄 Active: badge at the top shows which contract "AI Extract KPIs/SLAs" would use.'],
  rebates:['Track tier thresholds against actual spend — accrued entitlement is calculated live, not typed in.','Reconcile against the supplier\'s own statement each cycle and flag variances as Disputed rather than letting them go quiet.','If a contract is active, "AI Extract Rebates" pulls rebate tiers straight from it — same quick vs. full review choice as elsewhere for long documents.','The 📄 Active: badge at the top shows which contract "AI Extract Rebates" would use.'],
  register:['One register for obligations, SLAs, and change orders — filter by type. Status auto-flags overdue items by due date.','Upload the contract once on the 0 · Tiering tab (Step 0) — this tab reflects it automatically under "Contract Analysis & Staging," with candidate obligation/SLA clauses staged for your review.','The "AI document review" panel below runs a full structured review of the active contract — long documents (over ~6,000 characters) show a chunk-count and cost estimate first, with a choice between a full chunked review (covers the whole document) or a quick first-section-only pass.','Its suggested tier is sourced from the same cached AI document review Tiering uses — no separate, possibly-disagreeing estimate.'],
  coverage:['Three logs in one place: category spend coverage, stakeholder feedback, and supplier collaboration opportunities.','% spend under contract here feeds the Governance rollup — keep it current, it\'s the headline leakage indicator.'],
  scorecard:['Score your organisation 1–5 across each dimension. This feeds the Governance rollup.','Re-run quarterly to track maturity trend.','This maturity assessment is CLM Suite\'s own model — 15 questions across 6 dimensions. It\'s informed by, but not copied from, CIPS/Hackett/WorldCC research; see the Framework tab for the specific benchmarks.'],
  governance:['This is the CPO-facing rollup: spend coverage, tier mix, overdue obligations, maturity gaps — the value-leak view.','Everything here is computed live from the other tabs.','PowerPoint deck export needs internet to load the library once per session.'],
  settings:['Sandbox mode drafts offline using templates — no key needed, good for testing.','Claude/Gemini calls go direct from your browser to the provider API using your own key. Keys are stored only in this browser\'s localStorage, never sent anywhere else by this app.','Set a fallback provider so a blocked/failed call still returns something useful (Sandbox is the safest default).','"Ground with web search" is off by default — without it, AI drafts come from trained knowledge only, not a live lookup.','"Test connection" and other AI calls now surface the actual API error message on failure (e.g. bad key, blocked network) rather than just a generic error.','The full-document "AI document review" (Tiering/Register/Rebates/QBR) uses Gemini directly when Primary mode is Claude or Gemini, regardless of which of those two is selected — that keeps its cost estimate accurate. In Sandbox mode it stays fully local instead — no Gemini call is made even if a Gemini key is stored.','Uploading on a non-Sandbox mode with a Gemini key set shows a one-time confirmation before the first upload each session, since that document\'s content will actually be sent to Gemini.']
};

const FRAMEWORK_MD = `
## Section 0 — Foundation & Pre-Contract Tiering
Every feature below depends on structured contract metadata, not PDFs in a folder. Core metadata: type, category, value, dates, renewal type, owner, risk tier. A clause library should tag key clauses (termination, liability, SLA, price adjustment, audit rights) so obligations and SLAs auto-populate a register rather than living in prose.

**Pre-contract tiering** segments contracts by Value, Risk, Criticality and Business Impact (1–5 each) into four tiers — Strategic, Managed, Transactional, Routine/Leverage — which sets the default management intensity for everything downstream. Score at signature; re-score on amendment, supplier risk event, or spend threshold breach.

## Section 1 — Obligation Tracking
Every deliverable, deadline, notice, and compliance requirement extracted into a trackable task: description, owner (business, not just procurement), due date, recurrence, evidence required, escalation path. Automated reminders at 30/60/90 days. Top-quartile organisations track over 90% of obligations with automated alerts (Hackett); median organisations still do this reactively in spreadsheets.

## Section 2 — KPIs
Defined pre-signature, not after: formula, data source, frequency, target/threshold written into the contract. Fed from operational systems into a live scorecard rather than manual quarterly collection.

## Section 3 — SLAs
Time/quality-bound commitments with financial consequences. Tiered breach mechanism (informal flag → formal notice → escalation → remedy/credit), with credit calculation automated — manual SLA credit tracking is a common source of value leakage.

## Section 4 — Rebate Monitoring
Rebate/tier entitlements linked to actual ERP/P2P spend data, with a running accrual-vs-entitlement view and quarterly reconciliation against supplier statements. Consistently one of the highest-value, least-visible leakage sources in benchmarking studies.

## Section 5 — Contract Change Orders / Amendments
Formal change control: request → impact assessment → materiality-based approval → version control with full audit trail. Every amendment should re-trigger the obligation/KPI/SLA register.

## Section 6 — Termination
Notice windows and auto-renewal triggers flagged 90–120 days ahead. Exit/transition checklist: knowledge transfer, data return, TSA if needed, final reconciliation. "% of contracts with unwanted auto-renewal" is a named red-flag metric in Hackett benchmarking.

## Section 7 — QBR (Quarterly Business Review)
Standard template auto-populated from KPI/SLA/spend/risk/rebate data. Intensity tiered by supplier segment — not every supplier needs a full QBR. Action items must feed back into the obligation tracker, closing the loop.

## Stakeholder Feedback, Spend & Category Coverage
Structured post-QBR stakeholder surveys tied to specific KPIs, not generic satisfaction checks. A spend cube mapped against the contract repository gives % of spend under active contract. A category × contract-status heatmap surfaces white space and prioritises where to build coverage next. Collaboration opportunities — joint business planning, innovation logs, gain-share — should be surfaced directly from QBR data for top-tier suppliers.

## Best Practice Reference Points
**CIPS's Contract Management Cycle** frames contract management as a distinct post-award competency — implementation, ongoing management, review, close-out — with strong emphasis on relationship management and risk, not just compliance administration.

**The Hackett Group's procurement benchmarking research (Digital World Class®)** shows top-quartile firms managing 97%+ of spend under contract, versus roughly 70% for typical organisations — with contract compliance rate, amendment cycle time, and % obligations tracked with automation as recurring benchmark metrics. The gap between top-quartile and median performers is driven by automation and pre-signature discipline, not raw effort.

/* ---------- charts (canvas-based: same drawing fns power on-screen + exported images) ---------- */
function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight){
  const words = String(text).split(' ');
  let line='', lines=[];
  words.forEach(w=>{
    const test = line?line+' '+w:w;
    if(ctx.measureText(test).width>maxWidth && line){ lines.push(line); line=w; } else line=test;
  });
  if(line) lines.push(line);
  const startY = y - (lines.length-1)*lineHeight/2;
  lines.forEach((l,i)=> ctx.fillText(l, x, startY+i*lineHeight));
}
function drawBarChart(ctx, w, h, data, opts={}){
  ctx.clearRect(0,0,w,h);
  const pad = {l:opts.labelWidth||100,r:24,t:16,b:16};
  const max = opts.max || Math.max(...data.map(d=>d.value),1);
  const rowH = (h-pad.t-pad.b)/Math.max(data.length,1);
  ctx.font = '11px Inter, sans-serif';
  data.forEach((d,i)=>{
    const y = pad.t + i*rowH + rowH*0.22;
    const barH = rowH*0.56;
    const barW = Math.max((w-pad.l-pad.r) * (Math.min(d.value,max)/max), 1);
    ctx.fillStyle = '#6b6459';
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText(d.label, pad.l-8, y+barH/2);
    ctx.fillStyle = d.color || '#a8792e';
    ctx.fillRect(pad.l, y, barW, barH);
    ctx.fillStyle = '#161b22';
    ctx.textAlign='left';
    ctx.fillText(opts.unit==='pct' ? d.value.toFixed(0)+'%' : d.value.toLocaleString(undefined,{maximumFractionDigits:1}), pad.l+barW+6, y+barH/2);
  });
}
function drawDonutChart(ctx, w, h, data, opts={}){
  ctx.clearRect(0,0,w,h);
  const total = data.reduce((a,d)=>a+d.value,0) || 1;
  const cx = w*0.32, cy=h/2, rOuter=Math.min(w*0.28,h*0.42), rInner=rOuter*0.55;
  let angle=-Math.PI/2;
  data.forEach(d=>{
    const slice = (d.value/total)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,rOuter,angle,angle+(slice||0.0001));
    ctx.closePath();
    ctx.fillStyle = d.color;
    ctx.fill();
    angle += slice;
  });
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath(); ctx.arc(cx,cy,rInner,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation='source-over';
  ctx.font='11px Inter, sans-serif'; ctx.textBaseline='middle';
  let ly = cy - (data.length-1)*9;
  data.forEach(d=>{
    ctx.fillStyle = d.color;
    ctx.fillRect(w*0.62, ly-5, 10, 10);
    ctx.fillStyle = '#161b22'; ctx.textAlign='left';
    ctx.fillText(`${d.label} (${d.value})`, w*0.62+15, ly);
    ly += 18;
  });
}
function drawRadarChart(ctx, w, h, data, opts={}){
  ctx.clearRect(0,0,w,h);
  const cx=w/2, cy=h/2-4, r=Math.min(w,h)*0.30;
  const n=data.length;
  const maxVal = opts.max||5;
  for(let ring=1; ring<=4; ring++){
    ctx.strokeStyle='#dcd9d0';
    ctx.beginPath();
    for(let i=0;i<=n;i++){
      const a = -Math.PI/2 + (i%n)*(2*Math.PI/n);
      const rr = r*ring/4;
      const x = cx+rr*Math.cos(a), y=cy+rr*Math.sin(a);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.font='10px Inter, sans-serif';
  data.forEach((d,i)=>{
    const a = -Math.PI/2 + i*(2*Math.PI/n);
    const x=cx+r*Math.cos(a), y=cy+r*Math.sin(a);
    ctx.strokeStyle='#dcd9d0';
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.stroke();
    const lx = cx+(r+16)*Math.cos(a), ly=cy+(r+16)*Math.sin(a);
    ctx.textAlign = Math.cos(a)>0.3?'left':(Math.cos(a)<-0.3?'right':'center');
    ctx.fillStyle='#3a4a5c';
    wrapCanvasText(ctx, d.label, lx, ly, 74, 11);
  });
  ctx.beginPath();
  data.forEach((d,i)=>{
    const a = -Math.PI/2 + i*(2*Math.PI/n);
    const rr = r*(Math.min(d.value,maxVal)/maxVal);
    const x=cx+rr*Math.cos(a), y=cy+rr*Math.sin(a);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle='rgba(168,121,46,0.35)';
  ctx.strokeStyle='#a8792e'; ctx.lineWidth=2;
  ctx.fill(); ctx.stroke();
}

function loadState(){
  try{
    const raw = window.localStorage.getItem('clm_suite_state');
    if(!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const parsed = JSON.parse(raw);
    const state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    const merge = (target, source) => {
      for (const key in source) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
          if (!target[key]) target[key] = {};
          merge(target[key], source[key]);
        } else {
          target[key] = source[key];
        }
      }
    };
    merge(state, parsed);
    return state;
  }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}

/* Days from today (local calendar day) to a 'YYYY-MM-DD' due date. Negative = overdue.
   Parses/compares local calendar days only — no UTC-midnight-vs-local-now skew. */
function daysUntil(dateStr){
  if(!dateStr) return null;
  const [y,m,d] = dateStr.split('-').map(Number);
  const due = new Date(y, m-1, d);
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.round((due-today)/86400000);
}

function mdToHtmlClean(md){
  const esc2 = s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = md.split('\n');
  let html='', inList=false;
  for(let raw of lines){
    let line = raw.trim();
    if(!line){ if(inList){html+='</ul>';inList=false;} continue; }
    if(line.startsWith('## ')){ if(inList){html+='</ul>';inList=false;} html+=`<h2>${esc2(line.slice(3))}</h2>`; continue; }
    if(line.startsWith('### ')){ if(inList){html+='</ul>';inList=false;} html+=`<h3>${esc2(line.slice(4))}</h3>`; continue; }
    let body = esc2(line.startsWith('- ')?line.slice(2):line);
    body = body.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
    if(line.startsWith('- ')){ if(!inList){html+='<ul>';inList=true;} html+=`<li>${body}</li>`; continue; }
    if(inList){html+='</ul>';inList=false;}
    html+=`<p>${body}</p>`;
  }
  if(inList) html+='</ul>';
  return html;
}

function downloadBlob(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

function loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector(`script[src="${src}"]`)){ resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload=()=>resolve(); s.onerror=()=>reject(new Error('Could not load '+src+' — check your internet connection.'));
    document.head.appendChild(s);
  });
}

async function extractTextFromPdf(arrayBuffer){
  const pdf = await window.pdfjsLib.getDocument({data:arrayBuffer}).promise;
  const totalPages = pdf.numPages;
  const maxPages = Math.min(totalPages, 350);
  let text=''; const pageOffsets=[];
  for(let i=1;i<=maxPages;i++){
    pageOffsets.push(text.length);
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it=>it.str).join(' ') + '\n';
  }
  return {text, totalPages, readPages:maxPages, pageOffsets};
}

/* blocks: [{h:2,text}, {h:3,text}, {p:text}, {table:{headers:[...],rows:[[...]]}}] */
function blocksToHtml(blocks){
  return blocks.map(b=>{
    if(b.h===2) return `<h2>${esc(b.text)}</h2>`;
    if(b.h===3) return `<h3>${esc(b.text)}</h3>`;
    if(b.p!==undefined) return `<p>${esc(b.p)}</p>`;
    if(b.image) return `<p><img src="${b.image}" width="${b.width||400}" height="${b.height||250}" style="max-width:100%;"></p>`;
    if(b.table){
      const head = `<tr>${b.table.headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr>`;
      const rows = b.table.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('');
      return `<table>${head}${rows}</table>`;
    }
    return '';
  }).join('');
}
function mdToBlocks(md){
  const blocks=[];
  md.split('\n').forEach(raw=>{
    const line = raw.trim();
    if(!line) return;
    if(line.startsWith('## ')){ blocks.push({h:2,text:line.slice(3)}); return; }
    if(line.startsWith('### ')){ blocks.push({h:3,text:line.slice(4)}); return; }
    let text = line.startsWith('- ') ? '• '+line.slice(2) : line;
    text = text.replace(/\*\*(.+?)\*\*/g,'$1');
    blocks.push({p:text});
  });
  return blocks;
}
function dataUrlToUint8Array(dataUrl){
  const base64 = dataUrl.split(',')[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return bytes;
}
async function exportDocxReal(title, blocks){
  try{
    await ensureDocxLib();
    const { Document, Packer, Paragraph, HeadingLevel, Table, TableRow, TableCell, WidthType, ImageRun } = window.docx;
    const children = [ new Paragraph({text:title, heading:HeadingLevel.TITLE}) ];
    blocks.forEach(b=>{
      if(b.h===2) children.push(new Paragraph({text:b.text, heading:HeadingLevel.HEADING_1}));
      else if(b.h===3) children.push(new Paragraph({text:b.text, heading:HeadingLevel.HEADING_2}));
      else if(b.p!==undefined) children.push(new Paragraph({text:b.p}));
      else if(b.image){
        children.push(new Paragraph({children:[ new ImageRun({ data: dataUrlToUint8Array(b.image), transformation:{width:b.width||400, height:b.height||250} }) ]}));
      }
      else if(b.table){
        const headerRow = new TableRow({children: b.table.headers.map(h=> new TableCell({children:[new Paragraph({text:String(h), bold:true})]}))});
        const rows = b.table.rows.map(r=> new TableRow({children: r.map(c=> new TableCell({children:[new Paragraph(String(c==null?'':c))]}))}));
        children.push(new Table({rows:[headerRow,...rows], width:{size:100,type:WidthType.PERCENTAGE}}));
      }
    });
    const doc = new Document({sections:[{children}]});
    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=title.replace(/[^a-z0-9]+/gi,'_')+'.docx';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  }catch(e){
    console.warn('Real .docx export failed, falling back to HTML .doc:', e);
    exportWordFallback(title, blocksToHtml(blocks));
  }

      return `${detail} (CORS policy blocked direct API access from the file:// protocol). Rationale: Browsers block direct network requests to security-sensitive API endpoints (especially Anthropic/Claude) from local files for safety. Fix: Run a local web server (e.g. run "python -m http.server" in this folder, then open "http://localhost:8000") or use Gemini, which supports direct browser requests from local files.`;
    } else {

  }
  return detail;
}

    if(mode==='gemini') return await askGemini(prompt);
    return await sandboxAnswer(prompt);
  }catch(primaryErr){
    const fb = STATE.ai.fallbackMode;
    const formattedError = formatNetworkError(primaryErr, mode);
    if(fb && fb!=='none' && fb!==mode){
      try{
        let text;
        if(fb==='claude') text = await askClaude(prompt);
        else if(fb==='gemini') text = await askGemini(prompt);
        else text = await sandboxAnswer(prompt);
        return `[Primary (${mode}) failed: ${formattedError} — used fallback: ${fb}]\n\n${text}`;
      }catch(fallbackErr){
        throw new Error(formattedError+' — fallback ('+fb+') also failed: '+formatNetworkError(fallbackErr, fb));
      }
    }
    throw new Error(formattedError);
  }
}
async function askClaude(prompt){
  if(!STATE.ai.claudeKey) throw new Error('No Claude API key set in Settings.');
  const body = { model: STATE.ai.claudeModel, max_tokens:1000, messages:[{role:'user',content:prompt}] };
  if(STATE.ai.webSearch) body.tools = [{ type:'web_search_20250305', name:'web_search' }];
  const res = await fetchWithTimeout('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':STATE.ai.claudeKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify(body)
  });
  if(!res.ok) {
    let msg = 'Claude API error ' + res.status;
    try {
      const errData = await res.json();
      if (errData.error && errData.error.message) {
        msg += ': ' + errData.error.message;
      }
    } catch(e) {}
    throw new Error(msg + ' — check key, or the browser may be blocking direct API calls (CORS). Try Sandbox mode.');
  }
  const data = await res.json();
  const textBlocks = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text);
  if(!textBlocks.length) throw new Error('Claude responded successfully but returned no usable text (possibly blocked by a safety filter, hit the token limit before producing text, or used an unsupported response type). Try again, rephrase, or switch provider in Settings.');
  return textBlocks.join('\n');
}
async function askGemini(prompt){
  if(!STATE.ai.geminiKey) throw new Error('No Gemini API key set in Settings.');
  const modelName = STATE.ai.geminiModel.startsWith('models/') ? STATE.ai.geminiModel.slice(7) : STATE.ai.geminiModel;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${STATE.ai.geminiKey}`;
  const body = { contents:[{parts:[{text:prompt}]}] };
  if(STATE.ai.webSearch) body.tools = [{ google_search: {} }];
  const res = await fetchWithTimeout(url, {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-goog-api-key': STATE.ai.geminiKey
    },
    body: JSON.stringify(body)
  });
  if(!res.ok) {
    let msg = 'Gemini API error ' + res.status;
    try {
      const errData = await res.json();
      if (errData.error && errData.error.message) {
        msg += ': ' + errData.error.message;
      }
    } catch(e) {}
    throw new Error(msg + ' — check key.');
  }
  const data = await res.json();
  const parts = data.candidates?.[0]?.content?.parts || [];
  const text = parts.filter(p=>p.text).map(p=>p.text).join('\n');
  if(!text) throw new Error('Gemini responded successfully but returned no usable text (possibly blocked by a safety filter, hit the token limit before producing text, or used an unsupported response type). Try again, rephrase, or switch provider in Settings.');
  return text;
}
function sandboxAnswer(prompt){
  // Offline, template-based draft — no network. Labelled honestly as Sandbox output.
  return new Promise(resolve=>{
    setTimeout(()=>{
      resolve(`[Sandbox draft — offline template, not model-generated]\n\nBased on the inputs provided, here is a structured first pass. Review and edit before use; connect Claude or Gemini in Settings for a fully drafted narrative.\n\n${prompt.slice(0,400)}${prompt.length>400?'…':''}`);
    }, 500);
  });
}
function clampScore(n){ n=parseInt(n)||3; return Math.max(1,Math.min(5,n)); }
function sandboxScoreContracts(names){
  // Deterministic offline heuristic — keyword-nudged, no network needed.
  return names.map(name=>{
    const lower = name.toLowerCase();
    let value=3, risk=3, criticality=3, impact=3;
    if(/sole source|single source|critical|core|master|strategic/.test(lower)){ risk++; criticality++; }
    if(/office|supplies|stationery|routine|misc|catering/.test(lower)){ value--; risk--; criticality--; impact--; }
    if(/cloud|it |software|data|security|technology/.test(lower)){ impact++; risk++; }
    if(/logistics|freight|supply chain|distribution/.test(lower)){ criticality++; value++; }
    return {name, value:clampScore(value), risk:clampScore(risk), criticality:clampScore(criticality), impact:clampScore(impact)};
  });
}
async function aiScoreBulkContracts(rawListText){
  const names = rawListText.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,30);
  if(!names.length) return [];
  if(STATE.ai.mode==='sandbox') return sandboxScoreContracts(names);
  const prompt = `For each contract/supplier name below, estimate procurement scores 1-5 for Value, Risk, Criticality, and Business Impact based on typical judgement for that category of spend. Return ONLY a JSON array, no commentary, no markdown fences, in this exact format: [{"name":"...","value":N,"risk":N,"criticality":N,"impact":N}]\n\nContracts:\n${names.join('\n')}`;
  try{
    const text = await askAI(prompt);
    const cleaned = text.replace(/```json|```/g,'').trim();
    const jsonStart = cleaned.indexOf('[');
    const jsonEnd = cleaned.lastIndexOf(']');
    const parsed = JSON.parse(cleaned.slice(jsonStart, jsonEnd+1));
    return parsed.map(p=>({name:p.name||'Unnamed', value:clampScore(p.value), risk:clampScore(p.risk), criticality:clampScore(p.criticality), impact:clampScore(p.impact)}));
  }catch(e){
    return sandboxScoreContracts(names); // graceful fallback if AI didn't return clean JSON
  }
}

function renderHeatmapSVG(bulk){
  const w=680,h=380,pad=44;
  const pts = bulk.map(r=>{
    const score = weightedScore(r); const tier = getTier(score);
    const x = pad + ((r.value-1)/4)*(w-2*pad);
    const y = h-pad - ((r.risk-1)/4)*(h-2*pad);
    const size = 6 + (r.criticality-1)*2.2;
    return {x,y,size,tier,name:r.name,score};
  });
  const colorOf = {t1:'#7a2e2e',t2:'#a8792e',t3:'#3a6b5c',t4:'#6b7280',terr:'#c0392b'};
  const gsbColorOf = {t1:'#a8792e',t2:'#7c8591',t3:'#8c5a3c',t4:'#8c5a3c',terr:'#c0392b'};
  const useColor = STATE.tierScheme==='gsb' ? gsbColorOf : colorOf;
  const dots = pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${p.size.toFixed(1)}" fill="${useColor[p.tier.code]}" fill-opacity="0.85" stroke="#ffffff" stroke-width="1.5"><title>${esc(p.name)} — score ${p.score.toFixed(1)} (${esc(tierDisplayName(p.tier.code))})</title></circle>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;background:#fff;border:1px solid var(--line);">
    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#dcd9d0"/>
    <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#dcd9d0"/>

function normalizeSupplierName(s){
  return (s||'').toLowerCase().trim()
    .replace(/[.,]/g,'')
    .replace(/\b(inc|incorporated|ltd|limited|llc|corp|corporation|co|company|plc|gmbh)\b\.?/g,'')
    .replace(/\s+/g,' ').trim();
}
// Matches by stable contract identity first (reliable, no name normalization needed), falling
// back to the existing exact/fuzzy name matching for rows with no contractId (manually entered,
// or predating this feature) or when no contractId is available to match against at all.
function matchByContractField(list, supplierName, field, contractId, idField){
  if(contractId && idField){
    const byId = list.filter(r=> r[idField] && r[idField]===contractId);
    if(byId.length) return {matches:byId, matchType:'id', variants:[]};
  }
  const target = normalizeSupplierName(supplierName);
  if(!target) return {matches:[], matchType:'none', variants:[]};
  const exact = list.filter(r=> normalizeSupplierName(r[field]||'')===target);
  if(exact.length) return {matches:exact, matchType:'exact', variants:[]};
  const fuzzy = list.filter(r=>{
    const sub = normalizeSupplierName(r[field]||'');
    return sub.length>=4 && target.length>=4 && (sub.includes(target)||target.includes(sub));
  });
  const variants = [...new Set(fuzzy.map(r=>r[field]))];
  return {matches:fuzzy, matchType: fuzzy.length?'fuzzy':'none', variants};
}
function getRegisterForSupplier(supplierName, contractId){ return matchByContractField(STATE.register, supplierName, 'contract', contractId, 'contractId'); }
function getRebatesForSupplier(supplierName){ return matchByContractField(STATE.rebates, supplierName, 'contractName'); }
function buildQbrRecommendations(q, matchedReg, matchedRebates, feedback){
  const recs = [];
  const breachedKpi = q.kpis.filter(k=>k.status==='Breached');
  const atRiskKpi = q.kpis.filter(k=>k.status==='At risk');
  const breachedSla = q.slas.filter(k=>k.status==='Breached');
  const atRiskSla = q.slas.filter(k=>k.status==='At risk');
  if(breachedSla.length) recs.push(`Escalate ${breachedSla.length} breached SLA(s) and agree a remediation timeline with the supplier before the next cycle.`);
  if(breachedKpi.length) recs.push(`Address ${breachedKpi.length} breached KPI(s) — request a root-cause and corrective action plan.`);
  if(atRiskSla.length || atRiskKpi.length) recs.push(`Monitor ${atRiskSla.length+atRiskKpi.length} at-risk KPI/SLA metric(s) closely ahead of the next review.`);
  const disputedRebates = matchedRebates.filter(r=>r.status==='Disputed');
  if(disputedRebates.length) recs.push(`Resolve ${disputedRebates.length} disputed rebate tier(s) before the next reconciliation cycle.`);
  const overdueItems = matchedReg.filter(r=> r.status!=='Complete' && r.dueDate && daysUntil(r.dueDate)<0);
  if(overdueItems.length) recs.push(`Close ${overdueItems.length} overdue obligation/SLA/change-order item(s) linked to this contract.`);
  const avgRating = feedback.length ? feedback.reduce((a,f)=>a+(Number(f.rating)||0),0)/feedback.length : null;
  if(avgRating!==null && avgRating<3) recs.push('Stakeholder sentiment is below neutral — schedule a relationship review with key stakeholders.');
  if(!recs.length) recs.push('No material issues flagged from current data — maintain current cadence.');
  return recs;
}
function getFeedbackForSupplier(supplierName){
  const target = normalizeSupplierName(supplierName);
  if(!target) return {matches:[], matchType:'none', variants:[]};
  const exact = STATE.coverage.feedback.filter(f=> normalizeSupplierName(f.subject)===target);
  if(exact.length) return {matches:exact, matchType:'exact', variants:[]};
  const fuzzy = STATE.coverage.feedback.filter(f=>{
    const sub = normalizeSupplierName(f.subject);
    return sub.length>=4 && target.length>=4 && (sub.includes(target) || target.includes(sub));
  });
  const variants = [...new Set(fuzzy.map(f=>f.subject))];
  return {matches:fuzzy, matchType: fuzzy.length ? 'fuzzy' : 'none', variants};
}

let IMPORT_STATUS_MSG = '';
let IMPORT_TRUNC_NOTE = '';
let IMPORT_SKIPPED_LEN = 0;
let KPI_SKIPPED_LEN = 0;
let DOC_REVIEW_STATUS = '';
let DOC_REVIEW_USE_SUMMARY = false;
function renderRegister(){
  const rows = STATE.register;
  if (STATE.activeContract && STATE.activeContract.text && IMPORT_RAW_TEXT !== STATE.activeContract.text) {
    IMPORT_RAW_TEXT = STATE.activeContract.text;
    IMPORT_FILE_NAME = STATE.activeContract.name;
    const obligationResult = extractObligationCandidates(IMPORT_RAW_TEXT);
    const kpiResult = extractKpiSlaCandidates(IMPORT_RAW_TEXT);
    IMPORT_STAGING = obligationResult.candidates;
    KPI_STAGING = kpiResult.candidates;
    IMPORT_SKIPPED_LEN = obligationResult.skippedForLength;
    KPI_SKIPPED_LEN = kpiResult.skippedForLength;
    SUGGESTED_TIER = heuristicTierFromText(IMPORT_RAW_TEXT);
    IMPORT_STATUS_MSG = '';
    IMPORT_TRUNC_NOTE = STATE.activeContract.truncNote || '';
  } else if ((!STATE.activeContract || !STATE.activeContract.text) && IMPORT_RAW_TEXT) {
    IMPORT_RAW_TEXT = '';
    IMPORT_FILE_NAME = '';
    IMPORT_STAGING = [];
    KPI_STAGING = [];
    IMPORT_SKIPPED_LEN = 0;
    KPI_SKIPPED_LEN = 0;
    SUGGESTED_TIER = null;
    IMPORT_STATUS_MSG = '';
    IMPORT_TRUNC_NOTE = '';
  }
  // Prefer the cached chunked review's tier over the heuristic guess whenever one exists for
  // this contract, so Register and Tiering never show/push two different numbers for the same
  // document (Phase 2 Step 3 — the heuristic stays only as the fallback with no cache to read).
  const cachedReviewForTier = (STATE.activeContract && STATE.activeContract.text) ? getCachedReview() : null;
  const DISPLAY_TIER = cachedReviewForTier ? cachedReviewForTier.final.suggestedTier : SUGGESTED_TIER;
  const skipNote = (IMPORT_SKIPPED_LEN || KPI_SKIPPED_LEN)

    : '';

    <tbody id="regBody">

    </tbody></table>
  </div>
  <div class="card">
    <h3>Contract Analysis & Staging</h3>
    ${STATE.activeContract && STATE.activeContract.name ? `
      <p class="small muted">Active contract: <b>${esc(STATE.activeContract.name)}</b> (uploaded at Step 0). Check the candidate clauses below to stage them into the register.</p>
      <div id="regImportStatusHost">${(IMPORT_STATUS_MSG || IMPORT_TRUNC_NOTE || skipNote) ? collapsibleBanner('regImportStatus',
        (IMPORT_TRUNC_NOTE || skipNote) ? '⚠ Import notice' : 'Import notice',
        `${IMPORT_STATUS_MSG?`<p style="margin:0 0 6px;">${IMPORT_STATUS_MSG}</p>`:''}${IMPORT_TRUNC_NOTE?`<p style="margin:0 0 6px;color:var(--amber);">${esc(IMPORT_TRUNC_NOTE)}</p>`:''}${skipNote?`<p style="margin:0;color:var(--amber);">⚠ ${esc(skipNote)}</p>`:''}`,
        {amber: !!(IMPORT_TRUNC_NOTE || skipNote), defaultOpen:true}) : ''}</div>
      <div id="regImportStatus" class="small muted"></div>
      ${DISPLAY_TIER ? `
        <hr class="divider">
        <div class="flex-between"><h4 style="margin:0;font-size:13.5px;">Suggested tiering for "${esc(IMPORT_FILE_NAME||'imported contract')}"</h4>
          <div class="row">
            ${cachedReviewForTier ? '' : '<button class="btn small outline" id="btnRefineTierAi">Refine with AI</button>'}
            <button class="btn small gold" id="btnAddSuggestedTier">Add to portfolio tiering</button>
          </div>
        </div>
        <div class="row small mono" style="gap:16px;margin-top:6px;align-items:center;">
          <span>Value ${DISPLAY_TIER.value}</span><span>Risk ${DISPLAY_TIER.risk}</span><span>Criticality ${DISPLAY_TIER.criticality}</span><span>Impact ${DISPLAY_TIER.impact}</span>
          <span class="badge ${tierBadgeClass(getTier(weightedScore(DISPLAY_TIER)).code)}">${tierDisplayName(getTier(weightedScore(DISPLAY_TIER)).code)}</span>
        </div>
        <p class="small muted" style="margin-top:6px;">${cachedReviewForTier ? 'Sourced from the full AI document review below — the same tier Tiering\'s auto-score and the portfolio table will use for this contract.' : 'Heuristic estimate (offline, keyword-based) — run the AI document review below for a fuller-text tier, or use "Refine with AI" for a quick single-call re-estimate.'}</p>
      ` : ''}
      ${IMPORT_STAGING.length ? `
        <div class="flex-between" style="margin-top:10px;">
          <h4 style="margin:0;font-size:13.5px;">Detected ${IMPORT_STAGING.length} candidate clause(s)</h4>
          <div class="row">
            ${IMPORT_RAW_TEXT ? '<button class="btn small outline" id="btnAiExtract">Refine with AI</button>' : ''}
            <button class="btn small outline" id="btnImportAll">Add all</button>
            <button class="btn small danger" id="btnImportClear">Discard</button>
          </div>
        </div>
        ${IMPORT_STAGING.map((t,i)=>`<div class="stagingRow"><div class="txt">${esc(t)}</div><button class="btn small outline" data-importadd="${i}">Add</button></div>`).join('')}

        ${KPI_STAGING.map((t,i)=>`<div class="stagingRow"><div class="txt">${esc(t)}</div><button class="btn small outline" data-kpiadd="${i}">Add to QBR</button></div>`).join('')}
      ` : ''}
      ${renderDocReviewPanel()}
    ` : `
      <p class="small muted">No active contract loaded. Please upload a contract document (.docx or .pdf) on the <b>0 · Tiering</b> tab (Step 0) first to run automated clause extraction.</p>
    `}
  </div>`;
}
function renderDocReviewPanel(){
  const text = STATE.activeContract.text;
  const chunks = chunkTextForReview(text, AI_REVIEW_CHUNK_SIZE);
  const isLong = chunks.length>1;
  const cachedResult = getCachedReview();
  let html = `<hr class="divider"><h3>AI document review (full text)</h3>
  ${STATE.ai.mode==='sandbox'
    ? `<p class="small muted">🔒 Sandbox mode is active — this review runs entirely locally using offline keyword heuristics. No document content is sent to Gemini or any other provider, even if a Gemini key is stored in ⚙ Settings.</p>`
    : `<p class="small muted">This feature always uses Gemini directly, regardless of whether Primary mode is Claude or Gemini — so the cost estimate below stays accurate. If no Gemini key is set, it falls back to the same offline keyword-based heuristic used elsewhere in the app.</p>`}`;
  if(DOC_REVIEW_STATUS) html += `<p class="small muted">${esc(DOC_REVIEW_STATUS)}</p>`;
  if(!cachedResult){
    if(!isLong){
      html += `<p class="small muted">Document is ${text.length.toLocaleString()} characters — under the single-call threshold, so one AI call reviews it in full.</p>
      <button class="btn small gold" id="btnRunDocReview">Run AI document review</button>`;
    }else{
      const cost = estimateChunkedReviewCost(chunks, STATE.ai.geminiModel);
      const pageOffsets = STATE.activeContract.pageOffsets || [];
      const pageNote = pageOffsets.length ? `${pageOffsets.length} pages` : `${text.length.toLocaleString()} characters`;
      html += `<p class="small">This document is approximately ${pageNote} — it will be reviewed in ${chunks.length} chunks to cover the full text. Estimated cost: ~$${cost.costUSD.toFixed(3)} for this document (based on ${STATE.ai.geminiModel} published per-token rates; actual cost/provider depends on your AI Settings). If you already have a summary of this contract, you can paste it instead for a faster, cheaper review.</p>
      <div class="row">
        <button class="btn small gold" id="btnRunFullReview">Run full chunked review (${chunks.length} chunks)</button>
        <button class="btn small outline" id="btnRunQuickReview">Quick review (first chunk only)</button>
        <button class="btn small outline" id="btnToggleSummary">${DOC_REVIEW_USE_SUMMARY?'Cancel summary':'Use a summary instead'}</button>
      </div>
      ${DOC_REVIEW_USE_SUMMARY ? `<div class="field" style="margin-top:8px;"><label>Paste a summary of this contract</label><textarea id="docReviewSummaryText" placeholder="Paste a shorter summary here…"></textarea>
      <button class="btn small gold" id="btnRunSummaryReview" style="margin-top:6px;">Review this summary</button></div>` : ''}`;
    }
  }else{
    const f = cachedResult.final;
    const li = arr => arr.length ? arr.map(x=>`<li>${esc(x.item)}${x.pageRange?` <span class="muted small">(${esc(x.pageRange)})</span>`:''}</li>`).join('') : '<li class="muted small">None found</li>';
    const liKpi = arr => arr.length ? arr.map(x=>`<li>${esc(x.name)}${x.target?` — target ${esc(x.target)}`:''}${x.pageRange?` <span class="muted small">(${esc(x.pageRange)})</span>`:''}</li>`).join('') : '<li class="muted small">None found</li>';
    const liRebate = arr => arr.length ? arr.map(x=>`<li>${esc(x.tierName)}${x.threshold?` — ${esc(x.threshold)}`:''}${x.ratePct?` (${x.ratePct}%)`:''}${x.pageRange?` <span class="muted small">(${esc(x.pageRange)})</span>`:''}</li>`).join('') : '<li class="muted small">None found</li>';
    html += `<p class="small muted">Mode: ${cachedResult.mode} — reviewed ${cachedResult.chunksReviewed} of ${cachedResult.chunkCount} chunk(s). <span class="muted">(cached — reused automatically by Rebates/QBR/Framework for this contract; "Discard review" below forces a fresh one everywhere.)</span></p>
    <p><b>Parties:</b> ${esc(f.parties.join('; ')||'—')}</p>
    <p><b>Term:</b> ${esc(f.term||'—')}</p>
    <p style="margin-bottom:4px;"><b>Financial mechanics:</b></p><ul>${li(f.financialMechanics)}</ul>
    <p style="margin-bottom:4px;"><b>Obligations / SLAs:</b></p><ul>${li(f.obligationsSlas)}</ul>
    <p style="margin-bottom:4px;"><b>KPIs:</b></p><ul>${liKpi(f.kpis)}</ul>
    <p style="margin-bottom:4px;"><b>SLAs:</b></p><ul>${liKpi(f.slas)}</ul>
    <p style="margin-bottom:4px;"><b>Rebate tiers:</b></p><ul>${liRebate(f.rebateTiers)}</ul>
    <p style="margin-bottom:4px;"><b>Risk flags:</b></p><ul>${li(f.riskFlags)}</ul>
    <div class="row">
      <button class="btn small outline" id="btnApplyDocReviewObligations">Add obligations/SLAs to Register</button>
      <button class="btn small danger" id="btnClearDocReview">Discard review</button>
    </div>
    <p class="small muted" style="margin-top:6px;">This review's suggested tier is applied automatically above — no separate step needed.</p>`;
  }
  return html;
}
function statusBadge(row){
  if(row.status==='Complete') return `<span class="badge ok">Complete</span>`;
  if(!row.dueDate) return `<span class="badge t4">No date</span>`;
  const diffDays = daysUntil(row.dueDate);
  if(diffDays<0) return `<span class="badge overdue">Overdue</span>`;
  if(diffDays<=30) return `<span class="badge due">Due soon</span>`;
  return `<span class="badge ok">On track</span>`;
}
function renderRegRow(r){
  return `<tr data-reg="${r.id}">
    <td><select data-f="type"><option ${r.type==='Obligation'?'selected':''}>Obligation</option><option ${r.type==='SLA'?'selected':''}>SLA</option><option ${r.type==='Change Order'?'selected':''}>Change Order</option></select></td>

    <td>${statusBadge(r)}

/* ========== SCORECARD ========== */
function renderScorecard(){
  const dims = {};
  SCORECARD_QUESTIONS.forEach(q=>{ dims[q.dim]=dims[q.dim]||[]; dims[q.dim].push(q); });
  let body='';
  Object.keys(dims).forEach(dim=>{
    body += `<div class="card"><h3>${esc(dim)}</h3>`;
    dims[dim].forEach(q=>{
      const val = STATE.scorecard[q.id]||3;
      body += `<div class="slider-row">
        <div class="slider-head"><span style="font-weight:400;font-size:13px;">${esc(q.text)}</span><span class="slider-score mono">${val}</span></div>
        <input type="range" min="1" max="5" step="1" value="${val}" data-sc="${q.id}">
      </div>`;
    });
    body += `</div>`;
  });
  const overall = SCORECARD_QUESTIONS.reduce((a,q)=>a+(STATE.scorecard[q.id]||3),0)/SCORECARD_QUESTIONS.length;
  return `
  <h2>Maturity Self-Assessment Scorecard</h2>
  <p class="small muted">This assessment is original to CLM Suite. The dimensions it scores are informed by benchmarking themes published by CIPS, The Hackett Group, and WorldCC (formerly IACCM) — see the Framework tab's Best Practice Reference Points for the specific sources.</p>
  <div class="result-strip"><div><div class="eyebrow" style="color:#a39a89;">Overall maturity</div><div class="tname">${overall.toFixed(1)} / 5.0</div></div></div>
  ${body}
  <div class="row"><button class="btn outline" id="btnScExport">Export scorecard to Word</button></div>`;
}

/* ========== GOVERNANCE ========== */
function computeGovernanceData(){
  const bulk = STATE.tieringBulk;
  const buckets = tierBucketCounts(bulk);
  // Rows whose tier couldn't be calculated (NaN/corrupted axis scores) are excluded from the
  // buckets above rather than silently counted as Routine/Leverage -- surface that exclusion
  // here instead of letting them just vanish from the mix with no visible trace.
  const tierDataErrors = bulk.filter(r=>getTier(weightedScore(r)).code==='terr').length;
  const reg = STATE.register;
  const overdue = reg.filter(r=>{
    if(r.status==='Complete'||!r.dueDate) return false;
    return daysUntil(r.dueDate)<0;
  });
  const dims = {};
  SCORECARD_QUESTIONS.forEach(q=>{ dims[q.dim]=dims[q.dim]||[]; dims[q.dim].push(STATE.scorecard[q.id]||3); });
  const dimAvg = Object.keys(dims).map(d=>({dim:d, avg: dims[d].reduce((a,b)=>a+b,0)/dims[d].length}));
  const weakest = [...dimAvg].sort((a,b)=>a.avg-b.avg).slice(0,3);
  const rebates = STATE.rebates;
  const totalAccrued = rebates.reduce((a,r)=>a+(Number(r.spendToDate)||0)*(Number(r.ratePct)||0)/100,0);
  const unreconciled = rebates.filter(r=>r.status!=='Reconciled');
  const disputed = rebates.filter(r=>r.status==='Disputed');
  const cats = STATE.coverage.categories;
  const totalSpend = cats.reduce((a,r)=>a+(Number(r.spend)||0),0);
  const weightedCovered = cats.reduce((a,r)=>a+(Number(r.spend)||0)*(Number(r.pctContract)||0)/100,0);
  const overallCoveragePct = totalSpend ? (weightedCovered/totalSpend*100) : 0;
  const whiteSpace = cats.filter(r=>(Number(r.pctContract)||0)<50);
  const lowFeedback = STATE.coverage.feedback.filter(f=>(Number(f.rating)||0)<=2);
  return {bulk,buckets,tierDataErrors,reg,overdue,dimAvg,weakest,rebates,totalAccrued,unreconciled,disputed,cats,totalSpend,overallCoveragePct,whiteSpace,lowFeedback};
}
function buildGovernanceInsights(d){
  const risks = [];
  if(d.tierDataErrors) risks.push(`${d.tierDataErrors} contract(s) in the Tiering bulk table have invalid/missing axis scores — their tier could not be calculated, so they're excluded from the mix above (NOT counted as Routine/Leverage). Repair on the Tiering tab.`);
  if(d.overdue.length) risks.push(`${d.overdue.length} obligation/SLA/change-order item(s) overdue — contractual exposure until closed.`);
  if(d.disputed.length) risks.push(`${d.disputed.length} rebate tier(s) marked Disputed — potential revenue leakage unresolved.`);
  if(d.whiteSpace.length) risks.push(`${d.whiteSpace.length} spend categor${d.whiteSpace.length===1?'y':'ies'} under 50% contract coverage — maverick spend / uncontrolled risk.`);
  if(d.lowFeedback.length) risks.push(`${d.lowFeedback.length} stakeholder feedback entr${d.lowFeedback.length===1?'y':'ies'} rated 2/5 or below — relationship risk.`);
  if(d.weakest.length) risks.push(`Weakest maturity dimension: "${d.weakest[0].dim}" at ${d.weakest[0].avg.toFixed(1)}/5.`);
  if(!risks.length) risks.push('No material risks flagged from current data.');

  const todo = [];
  if(d.overdue.length) todo.push(`Close out ${d.overdue.length} overdue register item(s), oldest due dates first.`);
  if(d.unreconciled.length) todo.push(`Reconcile ${d.unreconciled.length} open rebate tier(s) against supplier statements.`);
  if(d.whiteSpace.length) todo.push(`Scope contracts for white-space categories: ${d.whiteSpace.slice(0,5).map(c=>c.name||'(unnamed)').join(', ')}.`);
  if(d.weakest.length) todo.push(`Run an improvement action on "${d.weakest[0].dim}" — the lowest-scoring maturity dimension.`);
  if(d.lowFeedback.length) todo.push('Follow up directly with stakeholders who gave low ratings before the next QBR cycle.');
  if(!todo.length) todo.push('No urgent actions from current data — maintain current review cadence.');

  const recs = [];
  if(d.totalSpend>0 && d.overallCoveragePct<70) recs.push(`Spend under contract is ${d.overallCoveragePct.toFixed(0)}% — prioritise closing coverage in the highest-spend uncontracted categories first.`);
  const goldOrT1 = d.buckets.find(b=>b.cls==='gold'||b.cls==='t1');
  if(goldOrT1 && goldOrT1.count>0) recs.push(`Confirm every ${goldOrT1.label} contract has a named owner and an active QBR cadence — this is where value leakage is most costly.`);
  recs.push('Review this rollup at least quarterly alongside the QBR cycle so risks surface before renewal deadlines, not after.');
  return {risks, todo, recs};
}

function wireTiering(){
  document.getElementById('setTierScheme').addEventListener('change', e=>{
    STATE.tierScheme = e.target.value; saveState(); render();
  });
  document.querySelectorAll('input[type=range][data-axis]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      STATE.tieringSingle[e.target.dataset.axis] = parseInt(e.target.value);
      saveState(); render();
      // restore focus roughly by re-rendering (acceptable for slider UX)
    });
  });
  document.getElementById('btnAddBulkRow').addEventListener('click',()=>{
    STATE.tieringBulk.push({id:uid(),name:'New contract',value:3,risk:3,criticality:3,impact:3,unspscCode:'',cpvCode:''});
    saveState(); render();
  });
  document.getElementById('btnBulkAiScore').addEventListener('click', async ()=>{
    const raw = document.getElementById('bulkPasteList').value;
    const status = document.getElementById('bulkAiStatus');
    status.textContent = 'Scoring…';
    try{
      const scored = await aiScoreBulkContracts(raw);
      scored.forEach(s=>{ STATE.tieringBulk.push({id:uid(), ...s}); });
      saveState();
      status.textContent = scored.length ? `Added ${scored.length} contract(s) — review scores below.` : 'No names found — one per line.';
      document.getElementById('bulkPasteList').value = '';
      render();
    }catch(e){ status.innerHTML = `<span style="color:var(--red);">${esc(e.message)}</span>`; }
  });
  document.querySelectorAll('#bulkTbody tr[data-row]').forEach(tr=>{
    const id = tr.dataset.row;
    tr.querySelectorAll('[data-f]').forEach(inp=>{
      inp.addEventListener('change', e=>{
        const row = STATE.tieringBulk.find(r=>r.id===id);
        const f = e.target.dataset.f;
        const textFields = ['name','unspscCode','cpvCode']; // free text -- not 1-5 clamped scores
        row[f] = textFields.includes(f) ? e.target.value : Math.max(1,Math.min(5, parseInt(e.target.value)||1));
        saveState(); render();
      });
    });
  });
  document.querySelectorAll('[data-del]').forEach(b=>{
    b.addEventListener('click',()=>{
      STATE.tieringBulk = STATE.tieringBulk.filter(r=>r.id!==b.dataset.del);
      saveState(); render();
    });
  });
  const csvBtn = document.getElementById('btnExportBulkCSV');
  if(csvBtn) csvBtn.addEventListener('click',()=>{
    const rows = STATE.tieringBulk.map(r=>{
      const score = weightedScore(r); const tier = getTier(score);
      return [r.name,r.value,r.risk,r.criticality,r.impact,score.toFixed(1),tierDisplayName(tier.code)];
    });
    exportCSV('contract_tiering.csv', ['Contract','Value','Risk','Criticality','Impact','Score','Tier'], rows);
  });

  const fileInput = document.getElementById('tierUploadFile');
  if(fileInput){
    fileInput.addEventListener('change', async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      if(STATE.ai.mode!=='sandbox' && STATE.ai.geminiKey && !EXTERNAL_MODE_CONFIRM_SHOWN){
        const proceed = confirm(`This document will be sent to Google's Gemini API for full-document analysis (this feature always uses Gemini directly, regardless of your Primary provider setting).\n\nIf this contract is confidential, click Cancel and switch to Sandbox mode in ⚙ Settings first.\n\nOK = continue and analyze with Gemini.\nCancel = abort this upload.`);
        if(!proceed){ e.target.value=''; return; }
        EXTERNAL_MODE_CONFIRM_SHOWN = true;
      }
      const status = document.getElementById('tierUploadStatus');
      status.textContent = 'Reading document…';
      try{
        let text = '';
        let truncNote = '';
        let newPageOffsets = [];
        if(/\.pdf$/i.test(file.name)){
          await ensurePdfLib();
          const arrayBuffer = await file.arrayBuffer();
          const res = await extractTextFromPdf(arrayBuffer);
          text = res.text;
          newPageOffsets = res.pageOffsets;
          if(res.totalPages > res.readPages){
            truncNote = `Read first ${res.readPages} of ${res.totalPages} pages.`;
          }
        }else{
          await ensureMammothLib();
          const arrayBuffer = await file.arrayBuffer();
          const result = await window.mammoth.extractRawText({arrayBuffer});
          text = result.value || '';
        }
        const appendMode = document.getElementById('chkAppendFile') && document.getElementById('chkAppendFile').checked;
        const newName = file.name.replace(/\.(docx|pdf)$/i,'');
        let combinedText = text;
        let combinedName = newName;
        let combinedPageOffsets = newPageOffsets;

        if (appendMode && STATE.activeContract && STATE.activeContract.text) {
          const prefix = STATE.activeContract.text + `\n\n--- Document: ${newName} ---\n`;
          combinedText = prefix + text;
          combinedName = STATE.activeContract.name + ' + ' + newName;
          // shift the newly-uploaded document's page offsets by the prefix length so they stay
          // valid within the combined text, and keep the prior document's own page offsets too.
          combinedPageOffsets = (STATE.activeContract.pageOffsets || []).concat(newPageOffsets.map(o => o + prefix.length));
        }

        const maxLen = 1200000; // Increased to 1.2M characters for at least 2x 300 pages
        if(combinedText.length > maxLen) {
          combinedText = combinedText.slice(0, maxLen);
          combinedPageOffsets = combinedPageOffsets.filter(o => o < maxLen);
          truncNote = (truncNote ? truncNote + ' ' : '') + 'Truncated to 1.2M chars for storage efficiency.';
        }

        // A fresh id per upload (including appends, since the text content changes) means any
        // cached review of the previous text is correctly treated as stale for the new content.
        STATE.activeContract = {
          id: uid(),
          name: combinedName,
          text: combinedText,
          truncNote: truncNote,
          pageOffsets: combinedPageOffsets
        };
        clearCachedReview();
        DOC_REVIEW_STATUS = '';
        DOC_REVIEW_USE_SUMMARY = false;

        status.textContent = 'Analyzing and auto-scoring contract...';
        const { final } = await chooseAndRunDocumentReview();
        STATE.tieringSingle = final.suggestedTier;
        STATE.qbr.supplier = STATE.activeContract.name;
        STATE.qbr.contractId = STATE.activeContract.id;
        if(STATE.ai.mode==='sandbox' && STATE.ai.geminiKey && !SANDBOX_REASSURANCE_SHOWN){
          SANDBOX_REASSURANCE_SHOWN = true;
          SANDBOX_REASSURANCE_MSG = '🔒 Confirmed: Sandbox mode was honored for this upload — this document was processed entirely locally using offline heuristics. No content was sent to Gemini, even though a Gemini key is stored in Settings.';
        }
        saveState();
        render();
      }catch(err){
        status.innerHTML = `<span style="color:var(--red);">${esc(err.message)}</span>`;
      }
    });
  }
  const clearBtn = document.getElementById('btnClearActiveContract');
  if(clearBtn) {
    clearBtn.addEventListener('click', ()=>{
      STATE.activeContract = {id:'', name:'', text:'', truncNote:'', pageOffsets:[]};
      clearCachedReview();
      DOC_REVIEW_STATUS = '';
      DOC_REVIEW_USE_SUMMARY = false;
      saveState();
      render();
    });
  }
}

function qbrStatusChartData(q){
  const all = [...q.kpis, ...q.slas];
  const counts = {'On track':0,'At risk':0,'Breached':0};
  all.forEach(k=>{ counts[k.status] = (counts[k.status]||0)+1; });
  return [
    {label:'On track', value:counts['On track'], color:'#2f6f4f'},
    {label:'At risk', value:counts['At risk'], color:'#b8892f'},
    {label:'Breached', value:counts['Breached'], color:'#a13b3b'}
  ].filter(d=>d.value>0);
}

function extractKpiSlaCandidates(text){
  const sentences = text.split(/\n+|(?<=[.;])\s+/).map(s=>s.trim()).filter(Boolean);
  const kw = /(\d{1,3}(\.\d+)?\s?%|\d+\s?(hours?|business days?|minutes?)|uptime|response time|on-time|defect rate|service level|turnaround|resolution time)/i;
  const seen = new Set(); const out = []; let skippedForLength = 0;
  for(const s of sentences){
    if(s.length<10) continue;
    if(!kw.test(s)) continue;
    if(s.length>250){ skippedForLength++; continue; }
    if(!seen.has(s)){ seen.add(s); out.push(s); if(out.length>=25) break; }
  }
  return {candidates:out, skippedForLength};
}
function extractTargetNumber(text){
  const m = text.match(/\d{1,3}(\.\d+)?\s?%|\d+\s?(hours?|business days?|minutes?)/i);
  return m ? m[0] : '';
}
function addCandidateToQbr(text){
  STATE.qbr.slas.push({id:uid(), name:text, target:extractTargetNumber(text), actual:'', status:'On track'});
  saveState();
}
function heuristicTierFromText(text){
  const lower = text.toLowerCase();
  let value=3, risk=3, criticality=3, impact=3;
  if(/(\$|USD|GBP|£|EUR|€)\s?\d[\d,]{3,}/.test(text)) value++;
  if(/(sole source|single source|no alternative|penalt(y|ies)|liquidated damages|indemnif|breach of contract)/i.test(lower)) risk++;
  if(/(critical|core system|mission.?critical|essential service|business continuity)/i.test(lower)) criticality++;
  if(/(regulatory|compliance|gdpr|data protection|health and safety|reputation|customer.?facing|public)/i.test(lower)) impact++;
  if(/(auto.?renew|evergreen)/i.test(lower)) risk++;
  return {value:clampScore(value),risk:clampScore(risk),criticality:clampScore(criticality),impact:clampScore(impact)};
}
async function aiSuggestTier(text){
  if(STATE.ai.mode==='sandbox') return heuristicTierFromText(text);
  const prompt = `Based on this contract text, estimate procurement tiering scores 1-5 for Value, Risk, Criticality and Business Impact. Return ONLY JSON, no commentary: {"value":N,"risk":N,"criticality":N,"impact":N}\n\nText:\n${text.slice(0,6000)}`;
  try{
    const res = await askAI(prompt);
    const cleaned = res.replace(/```json|```/g,'').trim();
    const s = cleaned.indexOf('{'), e = cleaned.lastIndexOf('}');
    const parsed = JSON.parse(cleaned.slice(s,e+1));
    return {value:clampScore(parsed.value),risk:clampScore(parsed.risk),criticality:clampScore(parsed.criticality),impact:clampScore(parsed.impact)};
  }catch(e){ return heuristicTierFromText(text); }
}
function extractObligationCandidates(text){
  const sentences = text.split(/\n+|(?<=[.;])\s+/).map(s=>s.trim()).filter(Boolean);
  const kw = /\b(shall|must|will (provide|deliver|notify|pay|maintain|ensure)|no later than|within \d+ (days|business days)|prior written notice|renewal|terminat(e|ion)|service level|penalt(y|ies)|liquidated damages)\b/i;
  const seen = new Set(); const out = []; let skippedForLength = 0;
  for(const s of sentences){
    if(s.length<15) continue;
    if(!kw.test(s)) continue;
    if(s.length>300){ skippedForLength++; continue; }
    if(!seen.has(s)){ seen.add(s); out.push(s); if(out.length>=40) break; }
  }
  return {candidates:out, skippedForLength};
}
async function aiExtractObligations(rawText){
  const prompt = `Extract distinct contractual obligations, deadlines, and SLA commitments from the following contract text as a plain newline-separated list, one obligation per line, no numbering, no commentary.\n\nText:\n${rawText.slice(0,6000)}`;
  const result = await askAI(prompt);
  return result.split('\n').map(s=>s.replace(/^[-•\d.]+\s*/,'').trim()).filter(s=>s.length>10 && s.length<300).slice(0,40);
}

/* ---------- full-document AI review: chunked map-reduce ---------- */
const AI_REVIEW_CHUNK_SIZE = 6000; // single-call threshold, matches the old text.slice(0,6000) cutoff
// Published Gemini per-1M-token rates (USD), approximate as of this writing — used only to
// compute a live cost ESTIMATE from actual chunk sizes, never a hardcoded flat total. Update
// if provider pricing changes; unrecognised models fall back to the gemini-2.0-flash rate.
const GEMINI_PRICING = {
  'gemini-2.0-flash': {inputPerMTok:0.10, outputPerMTok:0.40},
  'gemini-2.0-flash-lite': {inputPerMTok:0.075, outputPerMTok:0.30},
  'gemini-2.5-flash': {inputPerMTok:0.30, outputPerMTok:2.50},
  'gemini-2.5-pro': {inputPerMTok:1.25, outputPerMTok:10.00}
};
const CHARS_PER_TOKEN_EST = 4; // standard rough approximation for English text
const CHUNK_MAP_OUTPUT_TOKENS_EST = 300; // structured partial summary per chunk
const CHUNK_REDUCE_OUTPUT_TOKENS_EST = 800; // final structured review
const CHUNK_PROMPT_OVERHEAD_CHARS = 400; // instructions wrapped around each chunk's text
function geminiPricingFor(modelName){ return GEMINI_PRICING[modelName] || GEMINI_PRICING['gemini-2.0-flash']; }
function estimateChunkedReviewCost(chunks, modelName){
  const pricing = geminiPricingFor(modelName);
  let inputChars=0, outputTokens=0;
  chunks.forEach(c=>{ inputChars += c.text.length + CHUNK_PROMPT_OVERHEAD_CHARS; outputTokens += CHUNK_MAP_OUTPUT_TOKENS_EST; });
  inputChars += chunks.length*CHUNK_MAP_OUTPUT_TOKENS_EST*CHARS_PER_TOKEN_EST + CHUNK_PROMPT_OVERHEAD_CHARS; // reduce call input
  outputTokens += CHUNK_REDUCE_OUTPUT_TOKENS_EST;
  const inputTokens = inputChars/CHARS_PER_TOKEN_EST;
  const costUSD = (inputTokens/1e6)*pricing.inputPerMTok + (outputTokens/1e6)*pricing.outputPerMTok;
  return {inputTokensEst:Math.round(inputTokens), outputTokensEst:Math.round(outputTokens), costUSD};
}
function pageForOffset(offset, pageOffsets){
  if(!pageOffsets || !pageOffsets.length) return null;
  let page=1;
  for(let i=0;i<pageOffsets.length;i++){ if(pageOffsets[i]<=offset) page=i+1; else break; }
  return page;
}
function pageRangeLabel(start, end, pageOffsets){
  const p1 = pageForOffset(start, pageOffsets);
  if(p1==null) return '';
  const p2 = pageForOffset(Math.max(start,end-1), pageOffsets);
  return p1===p2 ? `p.${p1}` : `p.${p1}–${p2}`;
}
// Splits text into ~chunkSize chunks, breaking at paragraph/page boundaries (\n+) where
// possible; only falls back to sentence-boundary splitting for a single block that itself
// exceeds chunkSize. Tracks each chunk's [start,end) character offset in the original text
// so callers can map chunks back to an approximate page range via pageOffsets.
function chunkTextForReview(text, chunkSize){
  chunkSize = chunkSize || AI_REVIEW_CHUNK_SIZE;
  if(text.length<=chunkSize) return [{text, start:0, end:text.length}];
  const units=[];
  text.split(/\n+/).forEach(block=>{
    block = block.trim();
    if(!block) return;
    if(block.length<=chunkSize){ units.push(block); return; }
    const parts = block.split(/(?<=[.;])\s+/);
    let buf='';
    parts.forEach(p=>{
      if(buf && (buf.length+1+p.length)>chunkSize){ units.push(buf); buf=p; }
      else buf = buf ? buf+' '+p : p;
    });
    if(buf) units.push(buf);
  });
  const chunks=[]; let cur='', curStart=null, searchFrom=0;
  units.forEach(u=>{
    let idx = text.indexOf(u, searchFrom);
    if(idx===-1) idx = searchFrom;
    const uStart=idx, uEnd=idx+u.length;
    searchFrom = uEnd;
    if(curStart===null) curStart=uStart;
    if(cur && (cur.length+1+u.length)>chunkSize){
      chunks.push({text:cur, start:curStart, end:uStart});
      cur=u; curStart=uStart;
    }else{
      cur = cur ? cur+' '+u : u;
    }
  });
  if(cur) chunks.push({text:cur, start:curStart, end:text.length});
  return chunks;
}
function heuristicChunkSummary(chunkText, range){
  const obligations = extractObligationCandidates(chunkText).candidates.slice(0,10);
  const kpisSlas = extractKpiSlaCandidates(chunkText).candidates.slice(0,10);
  return {range, parties:[], obligations, kpisSlas, financialTerms:[], riskFlags:[]};
}
function heuristicFinalReview(text){
  const tier = heuristicTierFromText(text||'');
  const obligations = extractObligationCandidates(text||'').candidates.slice(0,15).map(item=>({item, pageRange:''}));
  const kpiSlaCandidates = extractKpiSlaCandidates(text||'').candidates.slice(0,15);
  const kpis = kpiSlaCandidates.slice(0,10).map(c=>({name:c, target:extractTargetNumber(c), pageRange:''}));
  const lower = (text||'').toLowerCase();
  const rebateTiers = (lower.includes('rebate') || lower.includes('volume discount'))
    ? [{tierName:'Volume rebate (heuristic match — review source)', threshold:'', ratePct:0, pageRange:''}] : [];
  return {parties:[], term:'', financialMechanics:[], obligationsSlas:[...obligations,...kpiSlaCandidates.map(item=>({item,pageRange:''}))], kpis, slas:[], rebateTiers, riskFlags:[], suggestedTier:tier};
}
function parseFinalReviewJson(raw, fallbackText){
  try{
    const cleaned = raw.replace(/```json|```/g,'').trim();
    const s = cleaned.indexOf('{'), e = cleaned.lastIndexOf('}');
    const parsed = JSON.parse(cleaned.slice(s,e+1));
    const normItems = arr => Array.isArray(arr) ? arr.map(x=> typeof x==='string' ? {item:x, pageRange:''} : {item:String(x.item||''), pageRange:x.pageRange?String(x.pageRange):''}) : [];
    const normKpiSla = arr => Array.isArray(arr) ? arr.map(x=>({name:String((x&&x.name)||''), target:String((x&&x.target)||''), pageRange:(x&&x.pageRange)?String(x.pageRange):''})) : [];
    const normRebates = arr => Array.isArray(arr) ? arr.map(x=>({tierName:String((x&&x.tierName)||''), threshold:String((x&&x.threshold)||''), ratePct:Number(x&&x.ratePct)||0, pageRange:(x&&x.pageRange)?String(x.pageRange):''})) : [];
    return {
      parties: Array.isArray(parsed.parties) ? parsed.parties.map(String) : [],
      term: parsed.term ? String(parsed.term) : '',
      financialMechanics: normItems(parsed.financialMechanics),
      obligationsSlas: normItems(parsed.obligationsSlas),
      kpis: normKpiSla(parsed.kpis),
      slas: normKpiSla(parsed.slas),
      rebateTiers: normRebates(parsed.rebateTiers),
      riskFlags: normItems(parsed.riskFlags),
      suggestedTier: {
        value:clampScore(parsed.suggestedTier&&parsed.suggestedTier.value), risk:clampScore(parsed.suggestedTier&&parsed.suggestedTier.risk),
        criticality:clampScore(parsed.suggestedTier&&parsed.suggestedTier.criticality), impact:clampScore(parsed.suggestedTier&&parsed.suggestedTier.impact)
      }
    };
  }catch(e){
    return heuristicFinalReview(fallbackText);
  }
}
// Single choke point every document-review Gemini call funnels through -- reviewDocumentSingleCall,
// mapChunkForReview, and reduceChunkSummaries all call THIS instead of askGemini directly. In
// Sandbox mode this throws before any network attempt, regardless of whether a Gemini key happens
// to be stored (e.g. left over from previously trying Gemini) -- the caller's existing catch-and-
// fall-back-to-heuristic handling then takes over. This is the actual guarantee: Sandbox mode is a
// hard gate here, not an accident of no key being present.
async function askGeminiForDocReview(prompt){
  if(STATE.ai.mode==='sandbox') throw new Error('SANDBOX_MODE_NO_NETWORK_CALL');
  return askGemini(prompt);
}
async function reviewDocumentSingleCall(text, pageOffsets){
  const prompt = `Review this contract document and produce a structured summary. Return ONLY JSON, no commentary, no markdown fences, in this exact shape:\n{"parties":[...],"term":"...","financialMechanics":[{"item":"...","pageRange":"..."}],"obligationsSlas":[{"item":"...","pageRange":"..."}],"kpis":[{"name":"...","target":"...","pageRange":"..."}],"slas":[{"name":"...","target":"...","pageRange":"..."}],"rebateTiers":[{"tierName":"...","threshold":"...","ratePct":N,"pageRange":"..."}],"riskFlags":[{"item":"...","pageRange":"..."}],"suggestedTier":{"value":N,"risk":N,"criticality":N,"impact":N}}\nOnly include a pageRange per item if reasonably inferable from context; otherwise use an empty string. If a category has nothing in the document, return an empty array for it.\n\nDocument text:\n${text}`;
  let raw;
  try{ raw = await askGeminiForDocReview(prompt); }catch(e){ return heuristicFinalReview(text); }
  return parseFinalReviewJson(raw, text);
}
async function mapChunkForReview(chunk, index, total, pageOffsets){
  const range = pageRangeLabel(chunk.start, chunk.end, pageOffsets) || `part ${index+1} of ${total}`;
  const prompt = `You are reviewing PART ${index+1} of ${total} of a single contract document (approx. ${range}). Extract ONLY what is explicitly present in this excerpt. Return ONLY JSON, no commentary, no markdown fences, in this exact shape:\n{"parties":[...strings...],"obligations":[...strings...],"kpisSlas":[...strings...],"financialTerms":[...strings...],"riskFlags":[...strings...]}\nIf a category has nothing in this excerpt, return an empty array for it.\n\nExcerpt:\n${chunk.text}`;
  let raw;
  try{ raw = await askGeminiForDocReview(prompt); }catch(e){ return heuristicChunkSummary(chunk.text, range); }
  try{
    const cleaned = raw.replace(/```json|```/g,'').trim();
    const s = cleaned.indexOf('{'), e = cleaned.lastIndexOf('}');
    const parsed = JSON.parse(cleaned.slice(s,e+1));
    const norm = k => Array.isArray(parsed[k]) ? parsed[k].map(String) : [];
    return {range, parties:norm('parties'), obligations:norm('obligations'), kpisSlas:norm('kpisSlas'), financialTerms:norm('financialTerms'), riskFlags:norm('riskFlags')};
  }catch(e){
    return heuristicChunkSummary(chunk.text, range);
  }
}
async function reduceChunkSummaries(partials, fallbackFullText){
  const packed = partials.map(p=>`[${p.range}]\nParties: ${p.parties.join('; ')}\nObligations: ${p.obligations.join('; ')}\nKPIs/SLAs: ${p.kpisSlas.join('; ')}\nFinancial terms: ${p.financialTerms.join('; ')}\nRisk flags: ${p.riskFlags.join('; ')}`).join('\n\n');
  const prompt = `You are combining partial summaries of DIFFERENT SECTIONS of the SAME single contract document into one final structured review. Each section below is labeled with its approximate page range or part number. Deduplicate overlapping items across sections, but KEEP each item's page-range attribution. Where the "KPIs/SLAs" and "Financial terms" lines contain KPI/SLA targets or rebate/volume-discount tiers, structure them into the kpis/slas/rebateTiers fields below rather than leaving them as loose text. Return ONLY JSON, no commentary, no markdown fences, in this exact shape:\n{"parties":[...],"term":"...","financialMechanics":[{"item":"...","pageRange":"..."}],"obligationsSlas":[{"item":"...","pageRange":"..."}],"kpis":[{"name":"...","target":"...","pageRange":"..."}],"slas":[{"name":"...","target":"...","pageRange":"..."}],"rebateTiers":[{"tierName":"...","threshold":"...","ratePct":N,"pageRange":"..."}],"riskFlags":[{"item":"...","pageRange":"..."}],"suggestedTier":{"value":N,"risk":N,"criticality":N,"impact":N}}\nIf a category has nothing across all sections, return an empty array for it.\n\nSection summaries:\n${packed}`;
  let raw;
  try{ raw = await askGeminiForDocReview(prompt); }catch(e){ return heuristicFinalReview(fallbackFullText); }
  return parseFinalReviewJson(raw, fallbackFullText);
}
// Orchestrator: <=1 chunk -> exactly one AI call (today's behavior, no chunk/cost UI needed).
// quickReview -> one AI call on the first chunk only (fast/cheap, same as the old truncated
// behavior). Otherwise -> full chunked map-reduce covering the whole document.
async function runDocumentReview(text, pageOffsets, opts={}){
  const chunks = chunkTextForReview(text, AI_REVIEW_CHUNK_SIZE);
  if(chunks.length<=1){
    const final = await reviewDocumentSingleCall(text, pageOffsets);
    return {final, mode:'single', chunkCount:1, chunksReviewed:1};
  }
  if(opts.quickReview){
    const slice = text.slice(0, AI_REVIEW_CHUNK_SIZE);
    const final = await reviewDocumentSingleCall(slice, pageOffsets);
    return {final, mode:'quick', chunkCount:chunks.length, chunksReviewed:1};
  }
  const partials=[];
  for(let i=0;i<chunks.length;i++){
    partials.push(await mapChunkForReview(chunks[i], i, chunks.length, pageOffsets));
    if(opts.onProgress) opts.onProgress(i+1, chunks.length);
  }
  const final = await reduceChunkSummaries(partials, text);
  return {final, mode:'chunked', chunkCount:chunks.length, chunksReviewed:chunks.length};
}
// Caches the last full review result against the active contract's stable id, so the five
// different features that can trigger a review of the same document (Tiering auto-score,
// Register's panel, Rebates/QBR extractors, Framework's executive summary) reuse one result
// instead of each re-chunking and re-calling the AI from scratch. Keyed on id specifically
// (not text) so a same-named re-upload still counts as a new document. Session-only, like
// DOC_REVIEW_STATUS -- not persisted to localStorage.
let DOC_REVIEW_CACHE = null; // {contractId, result}
function getCachedReview(){
  if(DOC_REVIEW_CACHE && STATE.activeContract && STATE.activeContract.id && DOC_REVIEW_CACHE.contractId===STATE.activeContract.id) return DOC_REVIEW_CACHE.result;
  return null;
}
function setCachedReview(result){
  if(STATE.activeContract && STATE.activeContract.id) DOC_REVIEW_CACHE = {contractId:STATE.activeContract.id, result};
}
function clearCachedReview(){ DOC_REVIEW_CACHE = null; }
// Shared entry point for any feature that wants to run a review of the active contract and
// needs the same quick-review vs full-chunked-review choice the main "AI document review"
// panel offers. Reuses a cached result for the same contract id if one already exists --
// only re-runs (and re-asks the quick/full question) for a document that hasn't been reviewed
// yet, or after an explicit fresh run discards the cache. For a short document there's nothing
// to choose (single call either way). For a long document, asks once via confirm() and reuses
// the exact same runDocumentReview engine (chunking, cost math, Gemini-forced calls, heuristic
// fallback) as the main panel.
async function chooseAndRunDocumentReview(){
  const cached = getCachedReview();
  if(cached) return cached;
  const text = STATE.activeContract.text;
  const pageOffsets = STATE.activeContract.pageOffsets;
  const chunks = chunkTextForReview(text, AI_REVIEW_CHUNK_SIZE);
  if(STATE.ai.mode==='sandbox'){
    // No Gemini call will be made regardless of the choice, so there's no cost/coverage
    // tradeoff to ask about -- skip the confirm() dialog entirely and run the heuristic over
    // the FULL text in one pass (free and instant locally, so no reason to artificially limit
    // coverage to a "quick" first-chunk-only slice the way the paid path does).
    const final = heuristicFinalReview(text);
    const result = {final, mode:'sandbox-local', chunkCount:chunks.length, chunksReviewed:chunks.length};
    setCachedReview(result);
    return result;
  }
  let quickReview = false;
  if(chunks.length>1){
    const cost = estimateChunkedReviewCost(chunks, STATE.ai.geminiModel);
    const runFull = confirm(`This document will be reviewed in ${chunks.length} chunks to cover the full text (est. cost ~$${cost.costUSD.toFixed(3)}, ${STATE.ai.geminiModel} rates).\n\nOK = full review (covers the whole document).\nCancel = quick review (first section only, faster/cheaper, partial coverage).`);
    quickReview = !runFull;
  }
  const result = await runDocumentReview(text, pageOffsets, {quickReview});
  setCachedReview(result);
  return result;
}
